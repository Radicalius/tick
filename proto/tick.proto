syntax = "proto3";

package tick.v1;

service Tick {
  rpc QueueTask(QueueTaskRequest) returns (QueueTaskResponse) {}
  rpc ResolveTask(ResolveTaskRequest) returns (ResolveTaskResponse) {}
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {}
  rpc PollTaskQueue(PollTaskQueueRequest) returns (PollTaskQueueResponse) {}
}

message QueueTaskRequest {
  string queue_name = 1;
  Task task = 2;
}

message QueueTaskResponse {}

message ResolveTaskRequest {
  int64 task_id = 1;
  string result = 2;
  TaskStatus status = 3;
}

message ResolveTaskResponse {}

message GetTaskRequest {
  string task_name = 1;
  map<string, string> parameters = 2;
}

message GetTaskResponse {
  Task task = 1;
}

message PollTaskQueueRequest {
  string queue_name = 1;
}

message PollTaskQueueResponse {
  Task task = 1;
}

enum TaskStatus {
  INVALID = 0;
  SUCCESS = 1;
  FAILURE = 2;
  PENDING = 3;
}

message Task {
  string task_name = 1;
  map<string, string> parameters = 2;
  string result = 3;
  TaskStatus status = 4;
}